<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 740" width="360" height="740">
  <defs>
    <linearGradient id="tealGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="gaugeTrack" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Phone body -->
  <rect x="30" y="10" width="300" height="720" rx="40" ry="40" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  <!-- Screen (pure black OLED) -->
  <rect x="44" y="30" width="272" height="680" rx="28" ry="28" fill="#000000"/>
  
  <!-- Notch -->
  <rect x="140" y="20" width="80" height="24" rx="12" fill="#1a1a1a"/>

  <!-- Status bar -->
  <text x="60" y="54" fill="#555" font-family="sans-serif" font-size="11" font-weight="600">9:41</text>
  <text x="290" y="54" fill="#555" font-family="sans-serif" font-size="10" text-anchor="end">📶 🔋 85%</text>

  <!-- Ambient Clock -->
  <text x="180" y="160" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="64" font-weight="300" letter-spacing="4">23:45</text>
  <text x="180" y="188" text-anchor="middle" fill="#14b8a6" font-family="system-ui, sans-serif" font-size="13" font-weight="500" letter-spacing="3" opacity="0.7">TUESDAY · JUL 14</text>

  <!-- System Vitals - 4 circular gauges -->
  <g transform="translate(180, 340)">
    <!-- Gauge ring base (background) -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="#111" stroke-width="6"/>
    
    <!-- CPU arc (~72%) -->
    <path d="M 0,-90 A 90,90 0 0,1 35.7,82.6" fill="none" stroke="url(#tealGlow)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
    <!-- RAM arc (~58%) -->
    <path d="M 65.1,62.2 A 90,90 0 0,1 -85.4,28.5" fill="none" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
    <!-- Disk arc (~34%) -->
    <path d="M -87.1,-22.4 A 90,90 0 0,1 -19.1,-87.9" fill="none" stroke="#8b5cf6" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
    <!-- Temp arc (~63°C) -->
    <path d="M 0,-90 A 90,90 0 0,1 87.1,-22.4" fill="none" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>

    <!-- Labels -->
    <text x="-50" y="-40" text-anchor="middle" fill="#71717a" font-family="sans-serif" font-size="11">CPU</text>
    <text x="50" y="-40" text-anchor="middle" fill="#71717a" font-family="sans-serif" font-size="11">RAM</text>
    <text x="-50" y="50" text-anchor="middle" fill="#71717a" font-family="sans-serif" font-size="11">DISK</text>
    <text x="50" y="50" text-anchor="middle" fill="#71717a" font-family="sans-serif" font-size="11">TEMP</text>

    <!-- Values -->
    <text x="-50" y="-25" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="16" font-weight="600">72%</text>
    <text x="50" y="-25" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="16" font-weight="600">58%</text>
    <text x="-50" y="65" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="16" font-weight="600">34%</text>
    <text x="50" y="65" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="16" font-weight="600">63°</text>
  </g>

  <!-- Wake Lock indicator at bottom -->
  <rect x="100" y="580" width="160" height="32" rx="16" fill="#0d9488" opacity="0.15" stroke="#0d9488" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="180" y="601" text-anchor="middle" fill="#0d9488" font-family="sans-serif" font-size="11" font-weight="500">🌙 Screen Always On</text>

  <!-- Home indicator -->
  <rect x="130" y="685" width="100" height="4" rx="2" fill="#222"/>
</svg>
