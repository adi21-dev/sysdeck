<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 740" width="360" height="740">
  <defs>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <linearGradient id="navActive" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- Phone body -->
  <rect x="30" y="10" width="300" height="720" rx="40" ry="40" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  <!-- Screen -->
  <rect x="44" y="30" width="272" height="680" rx="28" ry="28" fill="#000000"/>

  <!-- Notch -->
  <rect x="140" y="20" width="80" height="24" rx="12" fill="#1a1a1a"/>

  <!-- Status bar -->
  <text x="60" y="54" fill="#555" font-family="sans-serif" font-size="11" font-weight="600">9:41</text>
  <text x="290" y="54" fill="#555" font-family="sans-serif" font-size="10" text-anchor="end">📶 🔋 85%</text>

  <!-- Quick Toggles (4-column macro deck) -->
  <g transform="translate(52, 70)">
    <!-- Toggle 1: Mute -->
    <rect x="0" y="0" width="60" height="56" rx="12" fill="#18181b" stroke="#27272a" stroke-width="0.5"/>
    <text x="30" y="24" text-anchor="middle" fill="#71717a" font-family="sans-serif" font-size="16">🔇</text>
    <text x="30" y="46" text-anchor="middle" fill="#71717a" font-family="sans-serif" font-size="8">Mute</text>

    <!-- Toggle 2: Wi-Fi (active/teal) -->
    <rect x="68" y="0" width="60" height="56" rx="12" fill="#0d9488" fill-opacity="0.15" stroke="#0d9488" stroke-width="0.5"/>
    <text x="98" y="24" text-anchor="middle" fill="#14b8a6" font-family="sans-serif" font-size="16">📶</text>
    <text x="98" y="46" text-anchor="middle" fill="#14b8a6" font-family="sans-serif" font-size="8">Wi-Fi</text>

    <!-- Toggle 3: Monitor -->
    <rect x="136" y="0" width="60" height="56" rx="12" fill="#18181b" stroke="#27272a" stroke-width="0.5"/>
    <text x="166" y="24" text-anchor="middle" fill="#71717a" font-family="sans-serif" font-size="16">🖥️</text>
    <text x="166" y="46" text-anchor="middle" fill="#71717a" font-family="sans-serif" font-size="8">Monitor</text>

    <!-- Toggle 4: Lock -->
    <rect x="204" y="0" width="60" height="56" rx="12" fill="#18181b" stroke="#27272a" stroke-width="0.5"/>
    <text x="234" y="24" text-anchor="middle" fill="#71717a" font-family="sans-serif" font-size="16">🔒</text>
    <text x="234" y="46" text-anchor="middle" fill="#71717a" font-family="sans-serif" font-size="8">Lock</text>
  </g>

  <!-- Section header: Running Apps -->
  <text x="52" y="160" fill="#a1a1aa" font-family="sans-serif" font-size="12" font-weight="600">RUNNING APPS</text>

  <!-- Running Apps horizontal scroller -->
  <g transform="translate(52, 172)">
    <!-- App 1: VS Code (active) -->
    <rect x="0" y="0" width="80" height="90" rx="12" fill="url(#cardGrad)" stroke="#14b8a6" stroke-width="1"/>
    <text x="40" y="30" text-anchor="middle" fill="#14b8a6" font-family="sans-serif" font-size="22">⌨️</text>
    <text x="40" y="52" text-anchor="middle" fill="#d4d4d8" font-family="sans-serif" font-size="9" font-weight="500">Code</text>
    <text x="40" y="64" text-anchor="middle" fill="#52525b" font-family="sans-serif" font-size="7">index.tsx</text>
    <rect x="30" y="78" width="20" height="3" rx="1.5" fill="#14b8a6"/>

    <!-- App 2: Terminal -->
    <rect x="92" y="0" width="80" height="90" rx="12" fill="url(#cardGrad)" stroke="#27272a" stroke-width="0.5"/>
    <text x="132" y="30" text-anchor="middle" fill="#a1a1aa" font-family="sans-serif" font-size="22">💻</text>
    <text x="132" y="52" text-anchor="middle" fill="#d4d4d8" font-family="sans-serif" font-size="9" font-weight="500">Terminal</text>
    <text x="132" y="64" text-anchor="middle" fill="#52525b" font-family="sans-serif" font-size="7">bash</text>

    <!-- App 3: Spotify -->
    <rect x="184" y="0" width="80" height="90" rx="12" fill="url(#cardGrad)" stroke="#27272a" stroke-width="0.5"/>
    <text x="224" y="30" text-anchor="middle" fill="#a1a1aa" font-family="sans-serif" font-size="22">🎵</text>
    <text x="224" y="52" text-anchor="middle" fill="#d4d4d8" font-family="sans-serif" font-size="9" font-weight="500">Spotify</text>
    <text x="224" y="64" text-anchor="middle" fill="#52525b" font-family="sans-serif" font-size="7">Blinding...</text>
  </g>

  <!-- Section header: All Apps -->
  <text x="52" y="290" fill="#a1a1aa" font-family="sans-serif" font-size="12" font-weight="600">ALL APPS</text>

  <!-- All Apps grid (4x2) -->
  <g transform="translate(52, 300)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="60" height="60" rx="10" fill="#18181b" stroke="#27272a" stroke-width="0.5"/>
    <text x="30" y="34" text-anchor="middle" fill="#a1a1aa" font-family="sans-serif" font-size="22">🌐</text>

    <rect x="70" y="0" width="60" height="60" rx="10" fill="#18181b" stroke="#27272a" stroke-width="0.5"/>
    <text x="100" y="34" text-anchor="middle" fill="#a1a1aa" font-family="sans-serif" font-size="22">📝</text>

    <rect x="140" y="0" width="60" height="60" rx="10" fill="#18181b" stroke="#27272a" stroke-width="0.5"/>
    <text x="170" y="34" text-anchor="middle" fill="#a1a1aa" font-family="sans-serif" font-size="22">⚙️</text>

    <rect x="210" y="0" width="60" height="60" rx="10" fill="#0d9488" fill-opacity="0.08" stroke="#0d9488" stroke-width="0.5"/>
    <text x="240" y="34" text-anchor="middle" fill="#14b8a6" font-family="sans-serif" font-size="20">⌘</text>

    <!-- Row 2 (rounded corners continuation) -->
  </g>

  <!-- Search bar -->
  <rect x="52" y="410" width="256" height="36" rx="18" fill="#18181b" stroke="#27272a" stroke-width="0.5"/>
  <text x="75" y="433" fill="#52525b" font-family="sans-serif" font-size="13">🔍 Search apps...</text>

  <!-- Bottom Nav -->
  <g transform="translate(52, 480)">
    <rect x="0" y="0" width="272" height="50" rx="14" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="0.5"/>
    
    <!-- Overview (active / teal) -->
    <text x="34" y="28" text-anchor="middle" fill="#14b8a6" font-family="sans-serif" font-size="18">◉</text>
    <text x="34" y="43" text-anchor="middle" fill="#14b8a6" font-family="sans-serif" font-size="7">Overview</text>

    <!-- Files -->
    <text x="102" y="28" text-anchor="middle" fill="#52525b" font-family="sans-serif" font-size="16">📁</text>

    <!-- Terminal -->
    <text x="170" y="28" text-anchor="middle" fill="#52525b" font-family="sans-serif" font-size="16">⌨</text>

    <!-- Settings -->
    <text x="238" y="28" text-anchor="middle" fill="#52525b" font-family="sans-serif" font-size="16">⚡</text>
  </g>

  <!-- Home indicator -->
  <rect x="130" y="685" width="100" height="4" rx="2" fill="#222"/>
</svg>
