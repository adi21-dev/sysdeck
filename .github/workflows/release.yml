name: Release Build & Deploy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release Asset
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: sysdeck-agent-windows-x64.zip
            binary_name: sysdeck-agent.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: sysdeck-agent-linux-x64.tar.gz
            binary_name: sysdeck-agent
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: sysdeck-agent-macos-arm64.tar.gz
            binary_name: sysdeck-agent

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup Node.js and build the frontend (pre-requisite for backend embed)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # 2. Setup Linux System Libraries (Required for tray-icon & keyring compile)
      - name: Install Linux UI Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libgtk-3-dev libappindicator3-dev libsecret-1-dev libxdo-dev

      # 3. Setup Rust Toolchain
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: backend -> target

      # 4. Compile Backend
      - name: Build Backend (Release)
        run: |
          cd backend
          cargo build --release --target ${{ matrix.target }}

      # 5. Package Artifacts (Zip for Windows, Tar.gz for Unix)
      - name: Package Windows Binary
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd backend/target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.binary_name }} -DestinationPath ../../../../${{ matrix.artifact_name }}

      - name: Package Unix Binary
        if: matrix.os != 'windows-latest'
        run: |
          cd backend/target/${{ matrix.target }}/release
          tar -czf ../../../../${{ matrix.artifact_name }} ${{ matrix.binary_name }}

      # 6. Extract changelog entry for this release
      - name: Extract changelog entry
        id: changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            BEGIN { found = 0 }
            /^## \[/ {
              if (found) exit
              gsub(/^## \[/, ""); gsub(/\].*$/, "")
              if ($0 == ver) found = 1
              next
            }
            found { print }
          ' CHANGELOG.md > release_body.md
          echo "body_file=release_body.md" >> "$GITHUB_OUTPUT"

      # 7. Upload Assets to GitHub Releases
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
          body_path: ${{ steps.changelog.outputs.body_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
